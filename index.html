<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TruthLens - Fake News Detection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    min-height:100vh;
    background: linear-gradient(135deg,#0f172a,#1e293b,#111827);
    color:white;
}

.main{
    display:flex;
    min-height:100vh;
    flex-wrap:wrap;
}

.left{
    flex:1;
    min-width:320px;
    padding:70px 50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:58px;
    line-height:1.1;
    margin-bottom:20px;
}

.left h1 span{
    color:#38bdf8;
}

.left p{
    font-size:20px;
    color:#cbd5e1;
    line-height:1.6;
    margin-bottom:30px;
}

.badges{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.badges div{
    background:#1e293b;
    padding:10px 16px;
    border-radius:30px;
    border:1px solid #334155;
}

.right{
    flex:1;
    min-width:320px;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.card{
    width:100%;
    max-width:520px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;
    padding:28px;
    box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

.card h2{
    text-align:center;
    margin-bottom:20px;
    color:#38bdf8;
}

textarea{
    width:100%;
    height:190px;
    border:none;
    outline:none;
    border-radius:18px;
    padding:16px;
    font-size:17px;
    resize:none;
    background:#f8fafc;
    color:#111827;
}

button{
    width:100%;
    margin-top:18px;
    padding:14px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:white;
    background:linear-gradient(90deg,#06b6d4,#2563eb);
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:22px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.footer{
    text-align:center;
    padding:18px;
    background:#020617;
    color:#94a3b8;
}

@media(max-width:900px){
    .left h1{
        font-size:42px;
    }

    .left, .right{
        padding:35px 25px;
    }
}
</style>
</head>

<body>

<div class="main">

<div class="left">
    <h1>Detect <span>Truth</span><br>In Seconds</h1>
    <p>
        Advanced NLP based system that analyzes headlines and article text
        to classify whether news is likely real or fake.
    </p>

    <div class="badges">
        <div>⚡ Fast Prediction</div>
        <div>🧠 NLP Model</div>
        <div>📊 Accurate Output</div>
    </div>
</div>

<div class="right">
    <div class="card">

        <h2>📰 Fake News Analyzer</h2>

        <form action="/predict" method="post">
            <textarea name="news" placeholder="Paste headline or article text here..."></textarea>
            <button type="submit">Check Authenticity</button>
        </form>

        <div class="result">
            {{ prediction_text }}
        </div>

    </div>
</div>

</div>

<div class="footer">
    Major Project | Harini,vyshnavi | Fake News Detection using NLP
</div>

</body>
</html>
